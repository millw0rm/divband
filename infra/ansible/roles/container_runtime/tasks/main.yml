---
- name: Install containerd
  ansible.builtin.package:
    name: "{{ containerd_packages }}"
    state: present
  when: container_runtime_engine == 'containerd'

- name: Create containerd configuration directory
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    owner: root
    group: root
    mode: '0755'
  when: container_runtime_engine == 'containerd'

- name: Generate default containerd configuration
  ansible.builtin.command: containerd config default
  register: containerd_default_config
  changed_when: false
  when: container_runtime_engine == 'containerd'

- name: Configure containerd systemd cgroups
  ansible.builtin.copy:
    dest: "{{ containerd_config_path }}"
    content: "{{ containerd_default_config.stdout | regex_replace('SystemdCgroup = false', 'SystemdCgroup = true') }}\n"
    owner: root
    group: root
    mode: '0644'
  notify: Restart containerd
  when: container_runtime_engine == 'containerd'

- name: Install Docker
  ansible.builtin.package:
    name: "{{ docker_packages }}"
    state: present
  when: container_runtime_engine == 'docker'

- name: Enable selected container runtime service
  ansible.builtin.service:
    name: "{{ 'docker' if container_runtime_engine == 'docker' else 'containerd' }}"
    enabled: true
    state: started
