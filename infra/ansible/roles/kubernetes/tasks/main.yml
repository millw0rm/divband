---
- name: Fail when an unsupported Kubernetes distribution is selected
  ansible.builtin.fail:
    msg: "This scaffold currently implements k3s. Set kubernetes_distribution: k3s or extend the role for kubeadm."
  when: kubernetes_distribution != 'k3s'

- name: Install k3s server on control plane nodes
  ansible.builtin.shell: |
    set -euo pipefail
    curl -sfL {{ kubernetes_k3s_install_url }} | \
      INSTALL_K3S_CHANNEL={{ kubernetes_k3s_channel }} \
      sh -s - server \
      --cluster-cidr {{ kubernetes_pod_cidr }} \
      --service-cidr {{ kubernetes_service_cidr }} \
      {{ '--disable traefik' if kubernetes_disable_builtin_ingress else '' }}
  args:
    executable: /bin/bash
    creates: /etc/systemd/system/k3s.service
  when: kubernetes_node_role == 'control_plane'

- name: Read generated k3s node token
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_node_token
  when: kubernetes_node_role == 'control_plane'

- name: Publish k3s join token for later plays
  ansible.builtin.set_fact:
    kubernetes_join_token: "{{ k3s_node_token.content | b64decode | trim }}"
    cacheable: true
  when: kubernetes_node_role == 'control_plane'

- name: Install k3s agent on worker nodes
  ansible.builtin.shell: |
    set -euo pipefail
    curl -sfL {{ kubernetes_k3s_install_url }} | \
      K3S_URL={{ kubernetes_api_endpoint }} \
      K3S_TOKEN={{ hostvars[groups['control_plane'][0]].kubernetes_join_token | default(kubernetes_join_token) }} \
      INSTALL_K3S_CHANNEL={{ kubernetes_k3s_channel }} \
      sh -s - agent
  args:
    executable: /bin/bash
    creates: /etc/systemd/system/k3s-agent.service
  when: kubernetes_node_role == 'worker'

- name: Ensure kubeconfig is readable by operators on control plane
  ansible.builtin.file:
    path: /etc/rancher/k3s/k3s.yaml
    mode: '0640'
  when: kubernetes_node_role == 'control_plane'
