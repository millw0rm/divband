---
- name: Render divband control plane manifests
  ansible.builtin.template:
    src: control-plane.yml.j2
    dest: /tmp/divband-control-plane.yml
    owner: root
    group: root
    mode: '0600'

- name: Apply divband control plane manifests
  ansible.builtin.command:
    cmd: kubectl apply -f /tmp/divband-control-plane.yml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: divband_control_plane_apply
  changed_when: "'configured' in divband_control_plane_apply.stdout or 'created' in divband_control_plane_apply.stdout"

- name: Optionally apply reusable Kubernetes tenant templates
  ansible.builtin.command:
    cmd: "kubectl apply -k {{ divband_k8s_base_dir }}"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: divband_base_templates_apply
  changed_when: "'configured' in divband_base_templates_apply.stdout or 'created' in divband_base_templates_apply.stdout"
  when: divband_apply_base_templates
