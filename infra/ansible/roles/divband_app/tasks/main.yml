---
- name: Ensure divband namespace exists before kubeconfig hand-off
  ansible.builtin.command:
    cmd: "kubectl create namespace {{ divband_namespace }} --dry-run=client -o yaml"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: divband_namespace_manifest
  changed_when: false

- name: Apply divband namespace before kubeconfig hand-off
  ansible.builtin.command:
    cmd: kubectl apply -f -
    stdin: "{{ divband_namespace_manifest.stdout }}"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: divband_namespace_apply
  changed_when: "'configured' in divband_namespace_apply.stdout or 'created' in divband_namespace_apply.stdout"

- name: Create backend kubeconfig secret
  ansible.builtin.command:
    cmd: >-
      kubectl -n {{ divband_namespace }} create secret generic {{ divband_kubeconfig_secret_name }}
      --from-file=config={{ kubernetes_kubeconfig_export_path | default('/etc/rancher/k3s/divband-kubeconfig.yaml') }}
      --dry-run=client -o yaml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: divband_kubeconfig_secret_manifest
  changed_when: false
  no_log: true

- name: Apply backend kubeconfig secret
  ansible.builtin.command:
    cmd: kubectl apply -f -
    stdin: "{{ divband_kubeconfig_secret_manifest.stdout }}"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: divband_kubeconfig_secret_apply
  changed_when: "'configured' in divband_kubeconfig_secret_apply.stdout or 'created' in divband_kubeconfig_secret_apply.stdout"
  no_log: true

- name: Render divband control plane manifests
  ansible.builtin.template:
    src: control-plane.yml.j2
    dest: /tmp/divband-control-plane.yml
    owner: root
    group: root
    mode: '0600'

- name: Apply divband control plane manifests
  ansible.builtin.command:
    cmd: kubectl apply -f /tmp/divband-control-plane.yml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: divband_control_plane_apply
  changed_when: "'configured' in divband_control_plane_apply.stdout or 'created' in divband_control_plane_apply.stdout"

- name: Optionally apply reusable Kubernetes tenant templates
  ansible.builtin.command:
    cmd: "kubectl apply -k {{ divband_k8s_base_dir }}"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: divband_base_templates_apply
  changed_when: "'configured' in divband_base_templates_apply.stdout or 'created' in divband_base_templates_apply.stdout"
  when: divband_apply_base_templates
