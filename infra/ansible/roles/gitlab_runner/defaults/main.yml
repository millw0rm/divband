---
gitlab_url: https://git.divband.ir
gitlab_runner_package_name: gitlab-runner
gitlab_runner_install_repository: true
gitlab_runner_repository_script_url_debian: https://packages.gitlab.com/install/repositories/runner/gitlab-runner/script.deb.sh
gitlab_runner_repository_script_url_redhat: https://packages.gitlab.com/install/repositories/runner/gitlab-runner/script.rpm.sh
gitlab_runner_repository_script_path: /tmp/install-gitlab-runner-repository.sh

gitlab_runner_executor: kubernetes
gitlab_runner_description: "{{ inventory_hostname }}"
# Set gitlab_runner_project_key to a Terraform project key such as `acme/marketing`.
# The role reads both the token and project runner tag from Terraform outputs.
gitlab_runner_project_key: ""
gitlab_runner_token: "{{ vault_gitlab_runner_token | default('REPLACE_WITH_RUNNER_AUTHENTICATION_TOKEN') }}"
gitlab_runner_terraform_dir: "{{ playbook_dir }}/../../gitlab/terraform"
gitlab_runner_token_output_name: runner_authentication_tokens
gitlab_runner_projects_output_name: projects
# Leave empty to use the project-specific divband-* runner_tag from Terraform.
gitlab_runner_tags: []
gitlab_runner_extra_tags: []
gitlab_runner_locked: true
gitlab_runner_run_untagged: false
gitlab_runner_kubernetes_namespace: gitlab-runners
gitlab_runner_kubernetes_image: alpine:3.20
