---
- name: Install cert-manager CRDs and controller
  ansible.builtin.command:
    cmd: "kubectl apply -f {{ cert_manager_manifest_url }}"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: cert_manager_apply
  changed_when: "'configured' in cert_manager_apply.stdout or 'created' in cert_manager_apply.stdout"

- name: Render cert-manager ClusterIssuer
  ansible.builtin.template:
    src: cluster-issuer.yml.j2
    dest: /tmp/divband-cert-manager-cluster-issuer.yml
    owner: root
    group: root
    mode: '0600'

- name: Apply cert-manager ClusterIssuer
  ansible.builtin.command:
    cmd: kubectl apply -f /tmp/divband-cert-manager-cluster-issuer.yml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: cluster_issuer_apply
  changed_when: "'configured' in cluster_issuer_apply.stdout or 'created' in cluster_issuer_apply.stdout"
