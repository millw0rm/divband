---
- name: Refresh apt package cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: ansible_os_family == 'Debian'

- name: Install base packages
  ansible.builtin.package:
    name: "{{ common_base_packages }}"
    state: present

- name: Set host timezone
  community.general.timezone:
    name: "{{ divband_timezone }}"

- name: Enable systemd-timesyncd
  ansible.builtin.service:
    name: systemd-timesyncd
    enabled: true
    state: started
  when: ansible_service_mgr == 'systemd'

- name: Fail when systemd-resolved DNS is requested on unsupported hosts
  ansible.builtin.fail:
    msg: >-
      common_configure_systemd_resolved requires a systemd host because it writes
      /etc/systemd/resolved.conf.d/divband.conf and restarts systemd-resolved.
  when:
    - common_configure_systemd_resolved | bool
    - common_dns_resolvers | length > 0
    - ansible_service_mgr != 'systemd'

- name: Create systemd-resolved drop-in directory
  ansible.builtin.file:
    path: /etc/systemd/resolved.conf.d
    state: directory
    owner: root
    group: root
    mode: '0755'
  when:
    - common_configure_systemd_resolved | bool
    - common_dns_resolvers | length > 0
    - ansible_service_mgr == 'systemd'

- name: Configure systemd-resolved DNS servers
  ansible.builtin.copy:
    dest: /etc/systemd/resolved.conf.d/divband.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      [Resolve]
      DNS={{ common_dns_resolvers | join(' ') }}
      {% if common_dns_fallback_resolvers | length > 0 %}
      FallbackDNS={{ common_dns_fallback_resolvers | join(' ') }}
      {% endif %}
      {% if common_dns_domains | length > 0 %}
      Domains={{ common_dns_domains | join(' ') }}
      {% endif %}
  notify: Restart systemd-resolved
  when:
    - common_configure_systemd_resolved | bool
    - common_dns_resolvers | length > 0
    - ansible_service_mgr == 'systemd'

- name: Create platform admin users
  ansible.builtin.user:
    name: "{{ item.name }}"
    groups: "{{ item.groups | default([]) | join(',') }}"
    shell: "{{ item.shell | default('/bin/bash') }}"
    append: true
    state: present
  loop: "{{ divband_admin_users }}"

- name: Install operator SSH keys
  ansible.posix.authorized_key:
    user: "{{ item.0.name }}"
    key: "{{ item.1 }}"
    state: present
  loop: "{{ divband_admin_users | subelements('ssh_keys', skip_missing=True) }}"

- name: Harden sshd password authentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication\s+'
    line: "PasswordAuthentication {{ 'yes' if common_ssh_password_authentication else 'no' }}"
    validate: /usr/sbin/sshd -t -f %s
  notify: Restart ssh

- name: Harden sshd root login
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin\s+'
    line: "PermitRootLogin {{ 'yes' if common_ssh_permit_root_login else 'no' }}"
    validate: /usr/sbin/sshd -t -f %s
  notify: Restart ssh

- name: Configure default outgoing firewall policy
  community.general.ufw:
    direction: outgoing
    policy: "{{ 'allow' if common_firewall_default_allow_outgoing else 'deny' }}"

- name: Configure default incoming firewall policy
  community.general.ufw:
    direction: incoming
    policy: deny

- name: Allow required TCP ports
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ common_firewall_allowed_tcp_ports }}"

- name: Apply additional firewall rules
  community.general.ufw:
    rule: "{{ item.rule | default('allow') }}"
    port: "{{ item.port | default(omit) }}"
    proto: "{{ item.proto | default('tcp') }}"
    src: "{{ item.src | default(omit) }}"
  loop: "{{ common_firewall_additional_rules }}"

- name: Enable firewall
  community.general.ufw:
    state: enabled
