---
# Set to `install` to host GitLab on members of the `gitlab` inventory group.
# Set to `connect` to use an existing GitLab endpoint and optionally run the
# Terraform tenant/project provisioning from the operator workstation.
gitlab_mode: connect

gitlab_url: https://git.divband.ir
gitlab_external_url: "{{ gitlab_url }}"
gitlab_package_name: gitlab-ee
gitlab_install_repository: true
gitlab_repository_script_url_debian: "https://packages.gitlab.com/install/repositories/gitlab/{{ gitlab_package_name }}/script.deb.sh"
gitlab_repository_script_url_redhat: "https://packages.gitlab.com/install/repositories/gitlab/{{ gitlab_package_name }}/script.rpm.sh"
gitlab_repository_script_path: "/tmp/install-{{ gitlab_package_name }}-repository.sh"
gitlab_config_path: /etc/gitlab/gitlab.rb
gitlab_root_password: "{{ vault_gitlab_root_password | default('') }}"

gitlab_terraform_dir: "{{ playbook_dir }}/../../gitlab/terraform"
gitlab_run_terraform: false
gitlab_terraform_plan_file: tfplan
