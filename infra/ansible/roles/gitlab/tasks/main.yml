---
- name: Validate GitLab mode
  ansible.builtin.assert:
    that:
      - gitlab_mode in ['connect', 'install']
      - gitlab_url | length > 0
    fail_msg: "gitlab_mode must be 'connect' or 'install', and gitlab_url must be set."

- name: Show connected GitLab endpoint
  ansible.builtin.debug:
    msg: "Using existing GitLab endpoint {{ gitlab_url }}; Terraform integration path is {{ gitlab_terraform_dir }}"
  when: gitlab_mode == 'connect'

- name: Install GitLab repository prerequisites on Debian hosts
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - openssh-server
      - tzdata
    state: present
    update_cache: true
  when:
    - gitlab_mode == 'install'
    - gitlab_install_repository
    - ansible_os_family == 'Debian'

- name: Download GitLab package repository installer on Debian hosts
  ansible.builtin.get_url:
    url: "{{ gitlab_repository_script_url_debian }}"
    dest: "{{ gitlab_repository_script_path }}"
    mode: '0755'
  when:
    - gitlab_mode == 'install'
    - gitlab_install_repository
    - ansible_os_family == 'Debian'

- name: Configure GitLab package repository on Debian hosts
  ansible.builtin.command: "bash {{ gitlab_repository_script_path }}"
  args:
    creates: "/etc/apt/sources.list.d/gitlab_{{ gitlab_package_name }}.list"
  when:
    - gitlab_mode == 'install'
    - gitlab_install_repository
    - ansible_os_family == 'Debian'

- name: Install GitLab repository prerequisites on RedHat hosts
  ansible.builtin.package:
    name:
      - curl
      - openssh-server
      - policycoreutils-python-utils
      - tzdata
    state: present
  when:
    - gitlab_mode == 'install'
    - gitlab_install_repository
    - ansible_os_family == 'RedHat'

- name: Download GitLab package repository installer on RedHat hosts
  ansible.builtin.get_url:
    url: "{{ gitlab_repository_script_url_redhat }}"
    dest: "{{ gitlab_repository_script_path }}"
    mode: '0755'
  when:
    - gitlab_mode == 'install'
    - gitlab_install_repository
    - ansible_os_family == 'RedHat'

- name: Configure GitLab package repository on RedHat hosts
  ansible.builtin.command: "bash {{ gitlab_repository_script_path }}"
  args:
    creates: "/etc/yum.repos.d/gitlab_{{ gitlab_package_name }}.repo"
  when:
    - gitlab_mode == 'install'
    - gitlab_install_repository
    - ansible_os_family == 'RedHat'

- name: Install GitLab package when hosting GitLab on this VM
  ansible.builtin.package:
    name: "{{ gitlab_package_name }}"
    state: present
  environment:
    EXTERNAL_URL: "{{ gitlab_external_url }}"
    GITLAB_ROOT_PASSWORD: "{{ gitlab_root_password | default('') }}"
  no_log: "{{ gitlab_root_password is defined }}"
  when: gitlab_mode == 'install'

- name: Configure GitLab external URL
  ansible.builtin.lineinfile:
    path: "{{ gitlab_config_path }}"
    regexp: '^external_url '
    line: "external_url '{{ gitlab_external_url }}'"
    create: false
  notify: Reconfigure GitLab
  when: gitlab_mode == 'install'

- name: Flush GitLab reconfigure handler before Terraform uses the endpoint
  ansible.builtin.meta: flush_handlers
  when: gitlab_mode == 'install'

- name: Plan GitLab Terraform stack for tenant/project provisioning
  ansible.builtin.command:
    cmd: terraform plan -out={{ gitlab_terraform_plan_file }}
    chdir: "{{ gitlab_terraform_dir }}"
  delegate_to: localhost
  become: false
  register: gitlab_terraform_plan
  changed_when: false
  when: gitlab_run_terraform

- name: Apply GitLab Terraform stack
  ansible.builtin.command:
    cmd: terraform apply -auto-approve {{ gitlab_terraform_plan_file }}
    chdir: "{{ gitlab_terraform_dir }}"
  delegate_to: localhost
  become: false
  register: gitlab_terraform_apply
  changed_when: "'Apply complete' in gitlab_terraform_apply.stdout"
  when: gitlab_run_terraform
