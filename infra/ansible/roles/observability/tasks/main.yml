---
- name: Install metrics-server
  ansible.builtin.command:
    cmd: "kubectl apply -f {{ observability_metrics_server_manifest_url }}"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: metrics_server_apply
  changed_when: "'configured' in metrics_server_apply.stdout or 'created' in metrics_server_apply.stdout"
  when: observability_install_metrics_server

- name: Render Fluent Bit logging agent manifest
  ansible.builtin.template:
    src: fluent-bit.yml.j2
    dest: /tmp/divband-fluent-bit.yml
    owner: root
    group: root
    mode: '0600'
  when: observability_install_fluent_bit

- name: Install Fluent Bit logging agent
  ansible.builtin.command:
    cmd: kubectl apply -f /tmp/divband-fluent-bit.yml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: fluent_bit_apply
  changed_when: "'configured' in fluent_bit_apply.stdout or 'created' in fluent_bit_apply.stdout"
  when: observability_install_fluent_bit
