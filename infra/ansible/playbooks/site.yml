---
- name: Prepare all divband hosts
  hosts: all
  become: true
  roles:
    - role: common

- name: Install container runtime on Kubernetes nodes and runners
  hosts: control_plane:workers:runners
  become: true
  roles:
    - role: container_runtime

- name: Bootstrap Kubernetes control plane
  hosts: control_plane
  become: true
  roles:
    - role: kubernetes
      kubernetes_node_role: control_plane

- name: Join Kubernetes workers
  hosts: workers
  become: true
  roles:
    - role: kubernetes
      kubernetes_node_role: worker

- name: Install cluster platform add-ons
  hosts: control_plane[0]
  become: true
  roles:
    - role: ingress
    - role: cert_manager
    - role: external_secrets
    - role: divband_app

- name: Provision or connect GitLab
  hosts: gitlab
  become: true
  roles:
    - role: gitlab

- name: Register GitLab runners
  hosts: runners
  become: true
  roles:
    - role: gitlab_runner
